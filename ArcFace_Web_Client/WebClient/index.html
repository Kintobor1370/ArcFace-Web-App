<!DOCTYPE html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcFace Web Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            color: white;
            padding: 40px 20px;
        }
        main {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        section {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        .NewImageEntry form,
        .Comboboxes,
        .Combobox1,
        .Combobox2,
        .Results,
        .DatabaseList {
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
        }
        input[type="file"],
        select {
            width: 100%;
            max-width: 350px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(15, 23, 42, 0.8);
            color: white;
            margin: 8px;
            outline: none;
            transition: 0.2s ease;
        }
        input[type="file"]:hover,
        select:hover,
        input[type="file"]:focus,
        select:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.2);
        }
        .button {
            padding: 12px 22px;
            margin: 10px 6px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.35);
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(37, 99, 235, 0.45);
        }
        .button:active {
            transform: translateY(0);
        }
        .Comboboxes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        #Distance,
        #Similarity {
            display: inline-block;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 14px 20px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.75);
            min-width: 250px;
        }
        #WarningMessage {
            color: red
        }
        .Name h1 {
            margin: 18px 0;
            font-size: 1.8rem;
            color: white;
        }
        hr {
            border: none;
            height: 1px;
            background: rgba(255,255,255,0.15);
            margin: 18px 0;
        }
        #ImagesFromDatabase {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-top: 24px;
        }
        #ImagesFromDatabase > div {
            background: rgba(15, 23, 42, 0.7);
            border-radius: 16px;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.2s ease;
        }
        #ImagesFromDatabase > div:hover {
            transform: translateY(-3px);
            border-color: rgba(96, 165, 250, 0.5);
        }
        #ImagesFromDatabase img {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
        }
        @media (max-width: 768px) {
            body {
                padding: 20px 12px;
            }
            section {
                padding: 18px;
            }
            .Comboboxes {
                flex-direction: column;
            }
            input[type="file"],
            select {
                max-width: 100%;
            }
            .button {
                width: 100%;
                max-width: 350px;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="Intro" style="text-align: center;">
            <div class="Name">
                <h1>ArcFace Web Client</h1>
                <p>Upload ANY two face images and check how similar they are!</p>
            </div>
        </section>
        <section class="NewImageEntry">
            <form id="ImagePathForm" style="text-align: center;">
                <label for="NewImage">Add new image to the database:</label>
                <input id="NewImage" type="file" accept=".jpeg, .jpg, .png" placeholder="Path to image"/>
                <button id="AddImage" class="button" title="Add new image to the database" tabindex="0">Add</button>
            </form>
        </section>
        <section class="Comboboxes">
            <section class="Combobox1">
                <label for="Image1">Choose the first image: </label>
                <select required id="Image1"></select>
            </section>
            <section class="Combobox2">
                <label for="Image2">Choose the second image:</label>
                <select required id="Image2"></select>
            </section>
            <button id="Calculate" class="button" title="Calculate distance & similarity" tabindex="0">
                Start Calculations
            </button>
            <p id="WarningMessage"></p>
        </section>
        <section class="Results">
            <h1>Results:</h1>
            <hr/>
            <label id="Distance"></label>
            <label id="Similarity"></label>
        </section>
        <section class="DatabaseList" style="text-align: center;">
            <div class="Name">
                <label for="DeleteImages">Delete all images from the database:</label>
                <button id="DeleteAllImages"
                        class="button"
                        title="Delete all images from the database"
                        tabindex="0">
                    Delete
                </button>
                <hr/>
                <h1>Images from the database</h1>
                <hr/>
            </div>
            <div id="ImagesFromDatabase"></div>
        </section>
    </main>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
        crossorigin="anonymous"></script>
    <script src="js/main.js" type="text/javascript"></script>
</body>
</html>
